# Firebase App Hosting runtime config.
# NEXT_PUBLIC_* values are the Firebase client SDK config — not secrets, safe
# to commit (this is the same config already shipped in every page's HTML).
#
# ARKESEL_API_KEY / RESEND_API_KEY are intentionally NOT declared here since
# no real values exist yet (see src/app/api/notifications/order-confirmation)
# — that channel no-ops without them. Once real keys exist, set them with
# `firebase apphosting:secrets:set ARKESEL_API_KEY` (and RESEND_API_KEY),
# then add matching `secret:` entries below. Never commit real key values to
# this file.

runConfig:
  minInstances: 0

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyCfclz44u-rYJpU2JC6csNRDLq75MQPgEU"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "packagingambassador.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "packagingambassador"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "packagingambassador.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "325035461503"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:325035461503:web:5ed00228a26c2f099ae84a"
    availability:
      - BUILD
      - RUNTIME
